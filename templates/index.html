<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-client-id" content="{{ google_client_id }}">
    <title>CosenoIA - Generador de Código</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Highlight.js para el coloreado de sintaxis -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    
    <!-- Autenticación de Google -->
    <script src="https://accounts.google.com/gsi/client" ></script>
    
    <!-- CSS y JS Personalizado -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col overflow-hidden">

    <!-- Barra de Navegación -->
    <header class="bg-gray-800 border-b border-gray-700 h-14 flex items-center justify-between px-4 shrink-0">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold text-blue-400">CosenoIA</h1>
            <span class="text-xs bg-gray-700 px-2 py-1 rounded text-gray-300">Entorno Multi-Agente</span>
        </div>
        <div class="flex items-center gap-3">
        <button id="btn-new-chat" class="hidden bg-red-600 hover:bg-red-500 text-white px-3 py-1.5 rounded text-sm font-medium transition-colors">
            Nuevo Proyecto
        </button>
        <button id="btn-download" class="hidden bg-green-600 hover:bg-green-500 text-white px-3 py-1.5 rounded text-sm font-medium transition-colors">
            Descargar .ZIP
        </button>
        <div id="google-login-btn"></div>
        <div id="user-profile" class="hidden flex items-center gap-2">
            <img id="user-avatar" class="w-8 h-8 rounded-full border border-gray-600" src="" alt="Avatar">
            <span id="user-name" class="text-sm font-medium text-gray-200"></span>
        </div>
    </div>
    </header>

    <!-- Contenedor Principal -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- Panel Lateral (Chat y Archivos) -->
        <aside class="w-full md:w-80 lg:w-96 bg-gray-800 border-r border-gray-700 flex flex-col shrink-0">
            <!-- Pestañas del Panel Lateral -->
            <div class="flex border-b border-gray-700 shrink-0">
                <button id="tab-chat" class="flex-1 py-2 text-sm font-medium bg-gray-700 text-blue-400 border-b-2 border-blue-400">Chat</button>
                <button id="tab-files" class="flex-1 py-2 text-sm font-medium text-gray-400 hover:text-gray-200">Explorador</button>
            </div>

            <!-- Vista de Chat -->
            <div id="view-chat" class="flex-1 flex flex-col overflow-hidden">
                <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
                    <div class="text-center text-gray-500 text-sm mt-4">Inicia sesión para comenzar a programar.</div>
                </div>
                <div class="p-4 bg-gray-800 border-t border-gray-700 shrink-0">
                    <form id="chat-form" class="flex flex-col gap-2 relative">
                        <textarea id="chat-input" rows="3" disabled
                            class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-sm text-gray-100 focus:outline-none focus:border-blue-500 resize-none custom-scrollbar"
                            placeholder="Ej: Crea una API en Flask con una ruta para usuarios..."></textarea>
                        <button type="submit" id="chat-submit" disabled class="absolute bottom-2 right-2 bg-blue-600 hover:bg-blue-500 text-white p-1.5 rounded disabled:opacity-50 disabled:cursor-not-allowed">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Vista de Explorador de Archivos -->
            <div id="view-files" class="hidden flex-1 flex flex-col overflow-hidden">
                <div class="p-2 bg-gray-700 text-xs font-bold text-gray-400 uppercase tracking-wider">Archivos del Proyecto</div>
                <ul id="file-list" class="flex-1 overflow-y-auto py-2 custom-scrollbar text-sm">
                    <li class="px-4 py-2 text-gray-500">No hay archivos aún.</li>
                </ul>
            </div>
        </aside>

        <!-- Panel de Visualización (Código / Preview) -->
        <section class="flex-1 flex flex-col min-w-0 bg-gray-900">
            <div class="h-10 bg-gray-800 border-b border-gray-700 flex items-center justify-between px-4 shrink-0">
                <span id="current-filename" class="text-sm text-gray-400 font-mono">selecciona_un_archivo.py</span>
                <div class="flex gap-2">
                    <button id="btn-edit-code" class="text-xs bg-yellow-600 hover:bg-yellow-500 text-white px-3 py-1 rounded hidden">Editar a mano</button>
                    <button id="btn-save-code" class="text-xs bg-green-600 hover:bg-green-500 text-white px-3 py-1 rounded hidden">Guardar cambios</button>
                    <button id="btn-view-code" class="text-xs bg-gray-700 hover:bg-gray-600 text-white px-3 py-1 rounded">Vista Lectura</button>
                    <button id="btn-view-preview" class="text-xs bg-blue-600 hover:bg-blue-500 text-white px-3 py-1 rounded">Vista Previa Web</button>
                </div>
            </div>
            
            <div id="code-container" class="flex-1 overflow-auto custom-scrollbar relative flex flex-col">
                <!-- Vista de lectura (coloreada) -->
                <pre id="pre-viewer" class="m-0 flex-1"><code id="code-viewer" class="h-full p-4 text-sm font-mono bg-transparent"># El código generado aparecerá aquí</code></pre>
                <!-- Editor manual (texto plano) -->
                <textarea id="code-editor" class="hidden flex-1 w-full h-full bg-gray-900 text-gray-100 font-mono text-sm p-4 outline-none resize-none custom-scrollbar" spellcheck="false"></textarea>
            </div>
            
            <div id="preview-container" class="hidden flex-1 bg-white">
                <iframe id="web-preview" class="w-full h-full border-0"></iframe>
            </div>
        </section>
    </main>

    <!-- Overlay de Carga -->
    <div id="loading-overlay" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
        <div class="bg-gray-800 p-4 rounded-lg flex items-center gap-3 shadow-xl">
            <div class="w-5 h-5 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            <span class="text-sm font-medium">Generando código...</span>
        </div>
    </div>
</body>
</html>
