<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosenθ IA - Generador Multi-Agente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-gray-900 text-white h-screen overflow-hidden">
    <div id="app" class="flex h-screen overflow-hidden relative">
        
        <div 
            v-if="isMobileSidebarOpen" 
            class="fixed inset-0 bg-black/60 z-30 md:hidden transition-opacity duration-300" 
            @click="isMobileSidebarOpen = false"
            aria-hidden="true">
        </div>

        <aside 
            :class="[
                'bg-gray-800 border-r border-gray-700 flex flex-col fixed md:static inset-y-0 left-0 z-40 h-full w-72 transition-transform duration-300 ease-in-out',
                isSidebarPinned ? 'translate-x-0 md:static' : 'md:fixed',
                (isSidebarHovered && !isSidebarPinned) || (isMobileSidebarOpen) ? 'translate-x-0 shadow-2xl' : '-translate-x-full',
                !isSidebarPinned ? 'md:absolute md:top-0 md:bottom-0 md:z-40' : ''
            ]"
            @mouseenter="!isSidebarPinned ? isSidebarHovered = true : null"
            @mouseleave="isSidebarHovered = false">
            
            <div class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-800">
                <h1 class="text-3xl font-black tracking-tighter select-none">
                    <span class="text-gray-100">Cosen</span><span class="text-blue-400">θ IA</span>
                </h1>
                
                <button @click="isSidebarPinned = !isSidebarPinned" class="hidden md:block p-1 rounded text-gray-500 hover:text-white transition-colors" title="Fijar/Soltar panel">
                    <svg v-if="isSidebarPinned" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-500" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M11 17a1 1 0 001.447.894l4-2A1 1 0 0017 15V9.236a1 1 0 00-.553-.894l-4-2A1 1 0 0011 7.236V17z" />
                        <path d="M9 17V7.236a1 1 0 00-1.447-.894l-4 2A1 1 0 003 9.236V15a1 1 0 00.553.894l4 2A1 1 0 009 17z" />
                    </svg>
                    <svg v-else xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1V5a1 1 0 011-1h2" />
                    </svg>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4">
                <p class="text-gray-400 text-sm font-semibold mb-4">Tus proyectos recientes</p>
                </div>
        </aside>

        <main class="flex-1 flex flex-col bg-gray-900 w-full relative h-full overflow-hidden">
            
            <header class="w-full p-4 flex justify-between items-center border-b border-gray-800 z-10 bg-gray-900">
                <div class="flex items-center gap-3">
                    <button class="md:hidden text-gray-400 hover:text-white p-1 rounded" @click="isMobileSidebarOpen = true">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                    <h1 class="md:hidden text-2xl font-black tracking-tighter select-none">
                        <span class="text-gray-100">Cosen</span><span class="text-blue-400">θ IA</span>
                    </h1>
                </div>

                <div v-if="!isSidebarPinned && !isSidebarHovered" 
                    class="hidden md:block fixed left-0 top-16 bottom-0 w-4 z-20 cursor-pointer"
                    @mouseenter="isSidebarHovered = true">
                </div>

                <div class="bg-gray-800 rounded-full pl-2 pr-4 py-1 flex items-center shadow-lg border border-gray-700 min-h-[48px]">
                    <div v-show="!isLoggedIn" id="google-login-button"></div>
                    
                    <div v-show="isLoggedIn" class="flex items-center gap-3">
                        <img :src="userProfilePic" alt="Perfil" class="w-8 h-8 rounded-full border-2 border-blue-500">
                        <div class="text-right">
                            <p class="text-sm font-bold text-white leading-tight">{{ userName }}</p>
                            <button @click="logout" class="text-red-400 hover:text-red-300 text-xs font-semibold">Cerrar Sesión</button>
                        </div>
                    </div>
                </div>
            </header>

            <div class="flex-1 p-6 overflow-y-auto">
                <div class="bg-gray-800 rounded-xl h-full border border-gray-700 flex flex-col items-center justify-center shadow-inner relative overflow-hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-20 w-20 text-gray-700 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
                    </svg>
                    <p class="text-gray-400 text-lg">El código generado aparecerá aquí...</p>
                </div>
            </div>

            <div class="p-6 pt-0">
                <div class="relative max-w-4xl mx-auto">
                    <textarea 
                        class="w-full bg-gray-800 border border-gray-600 rounded-xl p-4 pr-16 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 resize-none shadow-lg transition-all"
                        rows="3"
                        placeholder="Describe la arquitectura, el frontend o la seguridad que necesitas generar..."
                    ></textarea>
                    <button class="absolute bottom-3 right-3 bg-blue-600 hover:bg-blue-500 text-white p-3 rounded-lg transition-all duration-200 shadow-md">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { createApp } = Vue

        createApp({
            data() {
                return {
                    isLoggedIn: false,
                    userName: '',
                    userProfilePic: '',
                    isSidebarPinned: true,     // Inicia anclado en Desktop
                    isSidebarHovered: false,   // Controla el hover en Desktop
                    isMobileSidebarOpen: false // Controla el estado en móviles
                }
            },
            mounted() {
                window.onload = () => {
                    google.accounts.id.initialize({
                        client_id: "{{ google_client_id }}",
                        callback: this.handleCredentialResponse
                    });
                    
                    google.accounts.id.renderButton(
                        document.getElementById("google-login-button"),
                        { theme: "filled_black", size: "medium", shape: "pill" }
                    );
                }
            },
            methods: {
                async handleCredentialResponse(response) {
                    try {
                        // Enviamos el token de seguridad de Google hacia nuestro servidor Flask
                        const res = await fetch('/api/auth/google', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ token: response.credential })
                        });

                        const data = await res.json();

                        if (data.success) {
                            // Actualizamos la interfaz con los datos reales validados por la base de datos
                            this.userName = data.user.nombre_completo;
                            this.userProfilePic = data.user.foto_perfil;
                            this.isLoggedIn = true;
                            console.log("Sesión persistida y auditada en PostgreSQL para:", data.user.email);
                        } else {
                            alert("Error en la autenticación del servidor: " + data.error);
                        }
                    } catch (error) {
                        console.error("Error al conectar con el backend:", error);
                    }
                },
                decodeJwtResponse(token) {
                    let base64Url = token.split('.')[1];
                    let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                    let jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                    }).join(''));
                    return JSON.parse(jsonPayload);
                },
                logout() {
                    this.isLoggedIn = false;
                    this.userName = '';
                    this.userProfilePic = '';
                    google.accounts.id.disableAutoSelect();
                    window.location.reload(); 
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
